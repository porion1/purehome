# ============================================================================
# APPLICATION CONFIGURATION - FAANG GRADE
# ============================================================================
spring.application.name=ui-core-service
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# ============================================================================
# SERVER CONFIGURATION
# ============================================================================
server.port=${SERVER_PORT:5201}
server.servlet.context-path=/
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=never
server.error.include-exception=false
server.compression.enabled=true
server.compression.mime-types=application/json,application/xml,text/html,text/xml,text/plain
server.compression.min-response-size=2048
server.tomcat.max-threads=200
server.tomcat.min-spare-threads=20
server.tomcat.accept-count=100
server.tomcat.max-connections=10000
server.tomcat.connection-timeout=20000

# ============================================================================
# MONGODB CONFIGURATION
# ============================================================================
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/ui_core_service}
spring.data.mongodb.database=${MONGODB_DATABASE:ui_core_service}
spring.data.mongodb.auto-index-creation=true

# Connection Pool Settings
spring.data.mongodb.connection-pool.max-size=100
spring.data.mongodb.connection-pool.min-size=10
spring.data.mongodb.connection-pool.max-wait-time=5000
spring.data.mongodb.connection-pool.max-connection-life-time=30
spring.data.mongodb.connection-pool.max-connection-idle-time=10

# Timeout Settings
spring.data.mongodb.connection-timeout=2000
spring.data.mongodb.socket-timeout=5000
spring.data.mongodb.server-selection-timeout=5000

# Write Concern
spring.data.mongodb.write-concern.journal=true

# Read Preference
spring.data.mongodb.read-preference=primaryPreferred

# ============================================================================
# REDIS CACHE CONFIGURATION (Port: 6379)
# ============================================================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.timeout=5000
spring.data.redis.lettuce.pool.max-active=50
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-wait=5000

# Cache TTL Settings
cache.default.ttl=3600
cache.pages.ttl=900
cache.published-pages.ttl=300
cache.versions.ttl=3600

# ============================================================================
# CACHE CONFIGURATION
# ============================================================================
spring.cache.type=redis
spring.cache.cache-names=pages,pageVersions,publishedPages,layouts,metadata,sessions,renderedLayouts
spring.cache.redis.time-to-live=3600000
spring.cache.redis.cache-null-values=false
spring.cache.redis.key-prefix=uicore:
spring.cache.redis.use-key-prefix=true

# Caffeine Local Cache (L1)
caffeine.cache.max-size=10000
caffeine.cache.expire-after-access=30
caffeine.cache.expire-after-write=60

# ============================================================================
# LAYOUT ENGINE CONFIGURATION (FAANG-ULTRA)
# ============================================================================
# Layout Engine General Settings
layout.engine.enabled=true
layout.engine.version=3.0.0

# Grid Configuration
layout.grid.default-columns=12
layout.grid.max-columns=24
layout.grid.min-card-width=1
layout.grid.max-card-width=12
layout.grid.min-card-height=1
layout.grid.max-card-height=6
layout.grid.default-cell-size=20

# Drag-Drop Settings
layout.drag-drop.enabled=true
layout.drag-drop.snap-threshold=10
layout.drag-drop.grid-size=20
layout.drag-drop.animation-duration=300
layout.drag-drop.undo-stack-size=50
layout.drag-drop.enable-predictive-drag=true
layout.drag-drop.enable-physics-simulation=true
layout.drag-drop.enable-magnetic-snap=true

# Collision Detection Settings
layout.collision.detection.enabled=true
layout.collision.resolution.strategy=AUTO
layout.collision.resolution.max-iterations=100
layout.collision.resolution.shift-distance=1
layout.collision.resolution.enable-quantum-detection=true

# Validation Rules
layout.validation.max-components-per-page=100
layout.validation.max-components-per-section=50
layout.validation.max-sections-per-page=20
layout.validation.max-nesting-depth=3
layout.validation.require-valid-dependencies=true
layout.validation.require-responsive-breakpoints=true
layout.validation.min-contrast-ratio=4.5
layout.validation.seo-meta-description-min-length=50
layout.validation.seo-meta-description-max-length=160
layout.validation.performance-max-load-time-ms=2000
layout.validation.performance-max-weight-bytes=2000000

# Real-Time Collaboration
layout.collaboration.enabled=true
layout.collaboration.lock-timeout-seconds=30
layout.collaboration.conflict-resolution=AUTO_MERGE
layout.collaboration.vector-clock-enabled=true
layout.collaboration.broadcast-drag-events=true

# Quantum Annealing Optimization
layout.optimization.enabled=true
layout.optimization.quantum-annealing.iterations=10000
layout.optimization.quantum-annealing.initial-temperature=1000.0
layout.optimization.quantum-annealing.cooling-rate=0.995
layout.optimization.quantum-annealing.reheat-interval=2000
layout.optimization.quantum-annealing.tunneling-probability=0.1
layout.optimization.default-strategy=BALANCED

# Optimization Dimension Weights (0-1, sum to 1)
layout.optimization.weights.engagement=0.25
layout.optimization.weights.performance=0.20
layout.optimization.weights.seo=0.15
layout.optimization.weights.accessibility=0.15
layout.optimization.weights.visual-hierarchy=0.10
layout.optimization.weights.responsiveness=0.10
layout.optimization.weights.dependencies=0.05

# Snapshot Configuration
layout.snapshot.enabled=true
layout.snapshot.auto-snapshot-on-publish=true
layout.snapshot.auto-snapshot-on-rollback=true
layout.snapshot.scheduled-snapshots.enabled=true
layout.snapshot.scheduled-snapshots.cron=0 0 0 * * ?
layout.snapshot.retention.manual-days=365
layout.snapshot.retention.automatic-days=90
layout.snapshot.retention.pre-publish-days=30
layout.snapshot.retention.scheduled-days=7

# Snapshot Storage Tiers
layout.snapshot.storage.hot.ttl-seconds=86400
layout.snapshot.storage.warm.ttl-seconds=7776000
layout.snapshot.storage.cold.ttl-seconds=31536000
layout.snapshot.storage.glacier.ttl-seconds=157680000

# Snapshot Compression
layout.snapshot.compression.enabled=true
layout.snapshot.compression.algorithm=ZSTD
layout.snapshot.compression.level=19
layout.snapshot.compression.delta-enabled=true
layout.snapshot.compression.dictionary-enabled=true
layout.snapshot.compression.dictionary-size-kb=32

# Cache Configuration
layout.cache.l1.max-size=10000
layout.cache.l1.ttl-seconds=300
layout.cache.l2.enabled=true
layout.cache.l2.ttl-seconds=3600
layout.cache.l3.enabled=true
layout.cache.l3.ttl-seconds=86400
layout.cache.l3.cdn-url-prefix=https://cdn.purehome.com/layouts/

# Rendering Configuration
layout.rendering.default-device=desktop
layout.rendering.enable-preview-mode=true
layout.rendering.enable-adaptive-rendering=true
layout.rendering.enable-critical-css=true
layout.rendering.enable-lazy-loading=true
layout.rendering.above-fold-components=5

# Responsive Breakpoints
layout.breakpoints.mobile.min-width=0
layout.breakpoints.mobile.max-width=767
layout.breakpoints.tablet.min-width=768
layout.breakpoints.tablet.max-width=1023
layout.breakpoints.desktop.min-width=1024
layout.breakpoints.desktop.max-width=1919
layout.breakpoints.wide.min-width=1920
layout.breakpoints.wide.max-width=999999

# Dependency Validation
layout.dependencies.validate-circular=true
layout.dependencies.max-depth=10
layout.dependencies.max-fan-in=20
layout.dependencies.auto-resolve=true

# ============================================================================
# SECURITY CONFIGURATION (JWT)
# ============================================================================
jwt.secret=${JWT_SECRET:default-secret-key-for-development-only-do-not-use-in-production}
jwt.expiration-ms=86400000
jwt.issuer=purehome.com
jwt.audience=ui-core-service

# OAuth2 Resource Server
spring.security.oauth2.resourceserver.jwt.issuer-uri=${JWT_ISSUER_URI:http://localhost:8080}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${JWK_SET_URI:http://localhost:8080/.well-known/jwks.json}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:3002,https://*.purehome.com}
cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
cors.allowed-headers=Authorization,Content-Type,X-Request-ID,X-API-Key,X-Tenant-ID,X-Device-ID,X-Correlation-ID
cors.exposed-headers=X-Total-Count,X-Rate-Limit,X-Rate-Remaining,X-Request-ID,X-Correlation-ID
cors.allow-credentials=true
cors.max-age=3600

# Rate Limiting (requests per minute)
rate-limit.default=100
rate-limit.premium=500
rate-limit.admin=1000

# ============================================================================
# LOGGING CONFIGURATION
# ============================================================================
logging.level.root=INFO
logging.level.com.purehome.uicore=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.data.mongodb=INFO
logging.level.org.springframework.security=INFO
logging.level.org.springframework.cache=INFO
logging.level.org.mongodb.driver=INFO

# Log File Configuration
logging.file.name=logs/ui-core-service.log
logging.file.path=./logs
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# Logstash JSON Format for Production
logging.logstash.enabled=${LOGSTASH_ENABLED:false}
logging.logstash.host=${LOGSTASH_HOST:localhost}
logging.logstash.port=${LOGSTASH_PORT:5044}

# ============================================================================
# ACTUATOR & MONITORING (Port: 5202)
# ============================================================================
management.server.port=${MANAGEMENT_PORT:5202}
management.endpoints.web.exposure.include=health,info,metrics,prometheus,caches,loggers,env,threaddump,heapdump
management.endpoints.web.exposure.exclude=beans,mappings
management.endpoint.health.show-details=always
management.endpoint.health.probes.enabled=true
management.endpoint.metrics.enabled=true
management.endpoint.prometheus.enabled=true
management.metrics.export.prometheus.enabled=true
management.metrics.distribution.slo.http.server.requests=10ms,50ms,100ms,200ms,500ms,1s,2s
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=${spring.profiles.active}

# Health Check Details
management.health.db.enabled=true
management.health.mongo.enabled=true
management.health.redis.enabled=true
management.health.diskspace.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

# ============================================================================
# SPRING DOC OPENAPI (Swagger) (Port: 5203)
# ============================================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true
springdoc.swagger-ui.display-request-duration=true
springdoc.show-actuator=true
springdoc.packages-to-scan=com.purehome.uicore.controller
springdoc.api-docs.enabled=true

# ============================================================================
# THREAD POOL & SCHEDULER CONFIGURATION
# ============================================================================
# Async Executor
async.core-pool-size=${ASYNC_CORE_POOL_SIZE:10}
async.max-pool-size=${ASYNC_MAX_POOL_SIZE:50}
async.queue-capacity=${ASYNC_QUEUE_CAPACITY:1000}
async.thread-name-prefix=async-

# Task Scheduler
scheduler.pool-size=${SCHEDULER_POOL_SIZE:10}
scheduler.thread-name-prefix=scheduler-

# Publishing Executor
publish.core-pool-size=${PUBLISH_CORE_POOL_SIZE:5}
publish.max-pool-size=${PUBLISH_MAX_POOL_SIZE:20}
publish.queue-capacity=${PUBLISH_QUEUE_CAPACITY:500}
publish.thread-name-prefix=publish-

# Webhook Executor
webhook.core-pool-size=${WEBHOOK_CORE_POOL_SIZE:10}
webhook.max-pool-size=${WEBHOOK_MAX_POOL_SIZE:50}
webhook.queue-capacity=${WEBHOOK_QUEUE_CAPACITY:2000}
webhook.thread-name-prefix=webhook-

# Audit Executor
audit.core-pool-size=${AUDIT_CORE_POOL_SIZE:20}
audit.max-pool-size=${AUDIT_MAX_POOL_SIZE:100}
audit.queue-capacity=${AUDIT_QUEUE_CAPACITY:10000}
audit.thread-name-prefix=audit-

# ============================================================================
# WEBSOCKET CONFIGURATION (Port: 5204)
# ============================================================================
websocket.port=${WEBSOCKET_PORT:5204}
websocket.message-size-limit=65536
websocket.send-time-limit=20000
websocket.send-buffer-size-limit=524288
websocket.time-to-first-message=30000

# STOMP Broker
stomp.broker.relay.enabled=false
stomp.broker.relay.host=${STOMP_RELAY_HOST:localhost}
stomp.broker.relay.port=${STOMP_RELAY_PORT:61613}
stomp.broker.system-login=${STOMP_SYSTEM_LOGIN:guest}
stomp.broker.system-passcode=${STOMP_SYSTEM_PASSCODE:guest}

# ============================================================================
# QUARTZ SCHEDULER CONFIGURATION
# ============================================================================
spring.quartz.job-store-type=memory
spring.quartz.properties.org.quartz.threadPool.threadCount=10
spring.quartz.properties.org.quartz.threadPool.threadPriority=5
spring.quartz.properties.org.quartz.scheduler.instanceName=UiCoreScheduler
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO

# ============================================================================
# DATASOURCE (Not used - MongoDB only)
# ============================================================================
spring.datasource.driver-class-name=org.mongodb.jdbc.MongoDriver

# ============================================================================
# EMAIL CONFIGURATION (Port: 587 for SMTP)
# ============================================================================
spring.mail.host=${SMTP_HOST:smtp.gmail.com}
spring.mail.port=${SMTP_PORT:587}
spring.mail.username=${SMTP_USERNAME:}
spring.mail.password=${SMTP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.main.allow-bean-definition-overriding=true

# ============================================================================
# WEBHOOK CONFIGURATION
# ============================================================================
webhook.retry.max-attempts=3
webhook.retry.backoff-delay=1000
webhook.timeout=10000
webhook.max-payload-size=10485760

# ============================================================================
# PUBLISHING CONFIGURATION
# ============================================================================
publishing.sitemap.enabled=true
publishing.sitemap.base-url=https://purehome.com
publishing.search-engine.ping=true
publishing.search-engine.endpoints=https://www.google.com/ping?sitemap={sitemap},https://www.bing.com/ping?sitemap={sitemap}
publishing.cdn.invalidation.enabled=true
publishing.cdn.invalidation.endpoint=https://api.cloudflare.com/client/v4/zones/{zone}/purge_cache

# ============================================================================
# RETRY CONFIGURATION
# ============================================================================
spring.retry.max-attempts=3
spring.retry.backoff.delay=100
spring.retry.backoff.multiplier=2
spring.retry.backoff.max-delay=5000

# ============================================================================
# CIRCUIT BREAKER (Resilience4j)
# ============================================================================
resilience4j.circuitbreaker.instances.publish-service.sliding-window-size=10
resilience4j.circuitbreaker.instances.publish-service.failure-rate-threshold=50
resilience4j.circuitbreaker.instances.publish-service.wait-duration-in-open-state=10000
resilience4j.circuitbreaker.instances.publish-service.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.instances.publish-service.automatic-transition-from-open-to-half-open-enabled=true

# ============================================================================
# BATCH PROCESSING
# ============================================================================
spring.batch.job.enabled=false
spring.batch.job.names=pageImportJob,versionPruneJob,auditArchiveJob

# ============================================================================
# PERFORMANCE TUNING
# ============================================================================
spring.mvc.async.request-timeout=30000
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false

# ============================================================================
# DEBUG & DEVELOPMENT
# ============================================================================
debug=false
trace=false
spring.devtools.restart.enabled=${DEVTOOLS_RESTART_ENABLED:false}
spring.devtools.livereload.enabled=${DEVTOOLS_LIVERELOAD_ENABLED:false}

# ============================================================================
# FEATURE FLAGS
# ============================================================================
feature.cache.enabled=true
feature.websocket.enabled=true
feature.audit.enabled=true
feature.canary-deployments.enabled=true
feature.batch-publishing.enabled=true
feature.webhooks.enabled=true

# ============================================================================
# TENANT & MULTI-TENANCY
# ============================================================================
multitenancy.enabled=${MULTITENANCY_ENABLED:false}
multitenancy.header-name=X-Tenant-ID
multitenancy.default-tenant=default

# ============================================================================
# API VERSIONING
# ============================================================================
api.version.default=v1
api.version.supported=v1,v2

# ============================================================================
# DOCUMENTATION & EXAMPLES
# ============================================================================
springdoc.default-consumes-media-type=application/json
springdoc.default-produces-media-type=application/json
springdoc.override-with-generic-response=false